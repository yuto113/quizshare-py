{% extends "base.html" %}
{% block title %}エラー監視 - Q'z{% endblock %}
{% block body_class %}qz-board-page{% endblock %}
{% block content %}
<style>
.site-header { display: none !important; }
.qz-staff-nav { background:#14213d; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; }
.qz-staff-nav a { color:rgba(255,255,255,0.6); font-size:0.8rem; text-decoration:none; }
.qz-staff-logo { font-size:0.85rem; letter-spacing:0.2em; color:#fb6f5b; font-weight:700; }
.err-wrap { max-width:860px; margin:24px auto; padding:0 20px; }
.err-row { background:white; border:1px solid #e3ddd0; border-radius:10px; padding:12px 14px; margin-bottom:10px; font-size:13px; }
.err-badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; color:white; margin-right:8px; }
</style>

<nav class="qz-staff-nav">
  <span class="qz-staff-logo">Q'Z STAFF</span>
  <div style="display:flex; gap:18px;">
    <a href="/staff/board">← 掲示板へ</a>
    <a href="/staff/hr">👑 人事</a>
  </div>
</nav>

<div class="err-wrap">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2 style="color:#14213d;">🚨 エラー監視</h2>
    <button onclick="clearErrors()" style="padding:8px 14px; background:#e76f51; color:white; border:none; border-radius:8px; cursor:pointer; font-size:13px;">🗑️ 全部消す</button>
  </div>
  <p style="color:#8a8270; font-size:13px;">サイトで起きたエラーが自動で記録されるよ(最新100件を表示)。定期的にチェックして、バグを友達より先に見つけよう。</p>
  <div id="err-list">読み込み中...</div>
</div>

<script>
async function loadErrors() {
  const r = await fetch('/api/staff/errors/list');
  const data = await r.json();
  if (data.ok === false || data.ok === undefined) { window.location.href = '/staff/board'; return; }
  if (data.errors.length === 0) {
    document.getElementById('err-list').innerHTML = '<p style="color:#2a9d8f; font-size:14px;">🎉 エラーは1件もないよ!</p>';
    return;
  }
  document.getElementById('err-list').innerHTML = data.errors.map(e => `
    <div class="err-row">
      <span class="err-badge" style="background:${e.source === 'server' ? '#e76f51' : '#3a6fd8'};">${e.source === 'server' ? 'サーバー' : 'ブラウザ'}</span>
      <b>${esc2(e.message)}</b>
      <div style="color:#8a8270; margin-top:4px;">${e.created_at} ・ ページ: ${esc2(e.path)}</div>
      ${e.detail ? `<details style="margin-top:6px;"><summary style="cursor:pointer; color:#3a6fd8;">くわしく見る</summary><pre style="white-space:pre-wrap; background:#f7f4ec; padding:10px; border-radius:8px; font-size:11px; overflow-x:auto;">${esc2(e.detail)}</pre></details>` : ''}
    </div>`).join('');
}

async function clearErrors() {
  if (confirm('エラー記録を全部消すよ？') === false) return;
  await fetch('/api/staff/errors/clear', {method: 'POST'});
  loadErrors();
}

function esc2(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
loadErrors();
</script>
{% endblock %}
