{% extends "base.html" %}
{% block title %}{{ event.title }} - 管理{% endblock %}
{% block content %}
<div style="max-width:900px; margin:0 auto; padding:20px 16px;">
  <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
    <a href="/event/{{ event.event_key }}" style="color:#9CA3AF; text-decoration:none; font-size:14px;">← イベントページへ</a>
    <h1 style="margin:0; font-size:22px; font-weight:900;">⚙️ {{ event.title }} 管理</h1>
  </div>

  <!-- タブ -->
  <div style="display:flex; gap:8px; margin-bottom:20px;">
    <button onclick="switchTab('quizzes')" id="tab-quizzes" style="padding:10px 20px; background:#667eea; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">📝 クイズ管理</button>
    <button onclick="switchTab('schedule')" id="tab-schedule" style="padding:10px 20px; background:#f3f4f6; color:#333; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">📅 日程管理</button>
    <button onclick="switchTab('results')" id="tab-results" style="padding:10px 20px; background:#f3f4f6; color:#333; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">🏆 結果確認</button>
  </div>

  <!-- クイズ管理 -->
  <div id="section-quizzes">
    <div style="background:white; border-radius:16px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,0.08); margin-bottom:16px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2 style="margin:0; font-size:18px; font-weight:900;">📝 クイズ一覧</h2>
        <button onclick="openAddQuiz()" style="padding:10px 18px; background:#667eea; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">➕ クイズ追加</button>
      </div>
      <div id="quiz-list">読み込み中...</div>
    </div>
  </div>

  <!-- 日程管理 -->
  <div id="section-schedule" style="display:none;">
    <div style="background:white; border-radius:16px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,0.08);">
      <h2 style="margin:0 0 20px; font-size:18px; font-weight:900;">📅 日程管理</h2>
      <div style="display:grid; gap:16px;">
        <div>
          <label style="font-size:13px; font-weight:900; color:#374151; display:block; margin-bottom:6px;">📅 開始日時</label>
          <input type="datetime-local" id="sched-start" value="{{ (event.start_date or '').replace(' ','T')[:16] }}"
            style="width:100%; padding:12px; border:2px solid #e5e7eb; border-radius:10px; font-size:15px; box-sizing:border-box;">
        </div>
        <div>
          <label style="font-size:13px; font-weight:900; color:#374151; display:block; margin-bottom:6px;">🏁 締切日時</label>
          <input type="datetime-local" id="sched-end" value="{{ (event.end_date or '').replace(' ','T')[:16] }}"
            style="width:100%; padding:12px; border:2px solid #e5e7eb; border-radius:10px; font-size:15px; box-sizing:border-box;">
        </div>
        <div>
          <label style="font-size:13px; font-weight:900; color:#374151; display:block; margin-bottom:6px;">🏆 結果発表日時</label>
          <input type="datetime-local" id="sched-result" value="{{ (event.result_date or '').replace(' ','T')[:16] }}"
            style="width:100%; padding:12px; border:2px solid #e5e7eb; border-radius:10px; font-size:15px; box-sizing:border-box;">
        </div>
        <button onclick="saveSchedule()" style="padding:14px; background:#667eea; color:white; border:none; border-radius:10px; font-weight:900; cursor:pointer; font-size:16px;">💾 日程を保存</button>
      </div>
    </div>
  </div>

  <!-- 結果確認 -->
  <div id="section-results" style="display:none;">
    <div style="background:white; border-radius:16px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,0.08);">
      <h2 style="margin:0 0 16px; font-size:18px; font-weight:900;">🏆 参加者・結果</h2>
      <div id="results-list">読み込み中...</div>
    </div>
  </div>
</div>

<!-- クイズ追加モーダル -->
<div id="add-quiz-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center; padding:20px;">
  <div style="background:white; border-radius:16px; padding:28px; max-width:520px; width:100%; max-height:90vh; overflow-y:auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h3 style="margin:0; font-size:18px; font-weight:900;">➕ クイズ追加</h3>
      <button onclick="document.getElementById('add-quiz-modal').style.display='none'" style="background:none; border:none; font-size:20px; cursor:pointer;">✕</button>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px; font-weight:900; color:#374151; display:block; margin-bottom:4px;">問題 *</label>
      <textarea id="q-question" rows="3" style="width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:10px; font-size:14px; box-sizing:border-box;" placeholder="問題文を入力"></textarea>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px; font-weight:900; color:#374151; display:block; margin-bottom:4px;">答え *</label>
      <input type="text" id="q-answer" style="width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:10px; font-size:14px; box-sizing:border-box;" placeholder="正解を入力">
    </div>
    <div style="margin-bottom:16px;">
      <label style="font-size:12px; font-weight:900; color:#374151; display:block; margin-bottom:4px;">解説(任意)</label>
      <textarea id="q-explanation" rows="2" style="width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:10px; font-size:14px; box-sizing:border-box;" placeholder="解説を入力"></textarea>
    </div>
    <button onclick="addQuiz()" style="width:100%; padding:12px; background:#667eea; color:white; border:none; border-radius:10px; font-weight:900; cursor:pointer; font-size:16px;">✅ 追加する</button>
  </div>
</div>

<script>
const eventKey = '{{ event.event_key }}';
const eventId = {{ event.id }};

function switchTab(tab) {
  ['quizzes','schedule','results'].forEach(t => {
    document.getElementById('section-' + t).style.display = t === tab ? 'block' : 'none';
    const btn = document.getElementById('tab-' + t);
    btn.style.background = t === tab ? '#667eea' : '#f3f4f6';
    btn.style.color = t === tab ? 'white' : '#333';
  });
  if (tab === 'results') loadResults();
  if (tab === 'quizzes') loadQuizzes();
}

async function loadQuizzes() {
  const r = await fetch('/api/events/' + eventKey + '/quizzes');
  const data = await r.json();
  const list = document.getElementById('quiz-list');
  if (!data.ok || data.quizzes.length === 0) {
    list.innerHTML = '<div style="text-align:center; color:#9CA3AF; padding:32px;">まだクイズがありません</div>';
    return;
  }
  list.innerHTML = data.quizzes.map((q, i) => `
    <div style="border:1px solid #f3f4f6; border-radius:12px; padding:14px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div style="font-size:12px; color:#9CA3AF; margin-bottom:4px;">Q${i+1}</div>
        <div style="font-weight:bold; font-size:15px;">${esc(q.question)}</div>
      </div>
      <button onclick="deleteQuiz('${q.id}')" style="padding:6px 12px; background:#fee2e2; color:#ef4444; border:none; border-radius:8px; cursor:pointer; font-size:12px; flex-shrink:0; margin-left:12px;">削除</button>
    </div>
  `).join('');
}

function openAddQuiz() {
  document.getElementById('add-quiz-modal').style.display = 'flex';
}

async function addQuiz() {
  const question = document.getElementById('q-question').value.trim();
  const answer = document.getElementById('q-answer').value.trim();
  const explanation = document.getElementById('q-explanation').value.trim();
  if (!question || !answer) { alert('問題と答えを入力してね'); return; }
  const r = await window.api.post('/api/quizzes', {
    name: '主催者', question, answer, answers: [answer],
    explanation, tags: ['イベント'], confirm_not_illegal: true
  });
  if (r) {
    window.toast('追加しました！', 'success');
    document.getElementById('add-quiz-modal').style.display = 'none';
    document.getElementById('q-question').value = '';
    document.getElementById('q-answer').value = '';
    document.getElementById('q-explanation').value = '';
    loadQuizzes();
  }
}

async function deleteQuiz(quizId) {
  if (!confirm('このクイズを削除しますか？')) return;
  await fetch('/api/quizzes/' + quizId, {method: 'DELETE'});
  loadQuizzes();
}

async function saveSchedule() {
  const start = document.getElementById('sched-start').value;
  const end = document.getElementById('sched-end').value;
  const result = document.getElementById('sched-result').value;
  const r = await fetch('/api/events/' + eventId + '/schedule', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({password: '{{ admin_pw }}', start_date: start, end_date: end, result_date: result})
  });
  const data = await r.json();
  if (data.ok) window.toast('日程を保存しました！', 'success');
  else alert(data.error || 'エラー');
}

async function loadResults() {
  const r = await fetch('/api/events/' + eventKey + '/ranking?pw={{ admin_pw }}');
  const data = await r.json();
  const list = document.getElementById('results-list');
  if (!data.ranking || data.ranking.length === 0) {
    list.innerHTML = '<div style="text-align:center; color:#9CA3AF; padding:32px;">まだ参加者がいません</div>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  list.innerHTML = `<div style="margin-bottom:12px; color:#6b7280; font-size:13px;">参加者: ${data.ranking.length}人</div>` +
    data.ranking.map(r => `
    <div style="display:flex; align-items:center; gap:12px; padding:12px; border-bottom:1px solid #f3f4f6;">
      <div style="font-size:${r.rank<=3?'24':'16'}px; width:32px; text-align:center; font-weight:900;">
        ${r.rank<=3 ? medals[r.rank-1] : r.rank}
      </div>
      <div style="flex:1; font-weight:bold;">${esc(r.nickname)}</div>
      <div style="text-align:right;">
        <div style="color:#10b981; font-weight:900;">${r.correct}/${r.total}</div>
        <div style="font-size:11px; color:#9CA3AF;">${Math.round(r.time_ms/1000)}秒</div>
      </div>
    </div>
  `).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadQuizzes();
</script>
{% endblock %}
