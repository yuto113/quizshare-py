{% extends "base.html" %}
{% block title %}KP残高 - Q'z{% endblock %}
{% block body_class %}qz-board-page{% endblock %}
{% block content %}
<style>
.site-header { display: none !important; }
body { background:#0d1220 !important; }
.k-wrap { max-width:680px; margin:24px auto; padding:0 20px; }
.k-box { background:#161d33; border:1px solid #2a3555; border-radius:12px; padding:16px; margin-bottom:12px; color:#dde3f5; }
.k-title { color:#9aa7ff; letter-spacing:0.15em; }
.kp-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #2a3555; flex-wrap:wrap; gap:6px; }
.kp-num { font-size:1.1rem; font-weight:900; color:#c8e6a0; }
.k-btn { padding:7px 14px; border:none; border-radius:8px; cursor:pointer; font-size:13px; color:white; white-space:nowrap; }
.k-input { padding:9px; border-radius:8px; border:1px solid #2a3555; background:#0d1220; color:#dde3f5; box-sizing:border-box; font-size:14px; }
</style>

{% include '_staff_nav.html' %}

<div class="k-wrap">
  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
    <h2 class="k-title" style="margin:0;">💎 KP残高</h2>
    <a href="/staff/kouan" style="color:#9aa7ff; font-size:13px;">← 公安ページへ</a>
  </div>
  <p id="kp-rate" style="color:#6b7799; font-size:12px;"></p>

  <div class="k-box" id="my-kp" style="text-align:center;">読み込み中...</div>

  <div class="k-box" id="transfer-box" style="display:none;">
    <b class="k-title" style="font-size:0.9rem;">🎁 KPをあげる</b>
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;">
      <select class="k-input" id="tr-member" style="flex:2; min-width:140px;"></select>
      <input class="k-input" id="tr-amount" type="number" min="1" placeholder="KP" style="flex:1; min-width:100px;">
      <button class="k-btn" style="background:#7a5a3d;" onclick="transferKP()">あげる</button>
    </div>
  </div>

  <div class="k-box" id="grant-box" style="display:none;">
    <b class="k-title" style="font-size:0.9rem;">💸 KP配布(ゼロ専用)</b>
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;">
      <select class="k-input" id="gr-member" style="flex:2; min-width:140px;"></select>
      <input class="k-input" id="gr-amount" type="number" placeholder="KP(マイナスで回収)" style="flex:1; min-width:130px;">
      <button class="k-btn" style="background:#3d4a7a;" onclick="grantKP()">配布</button>
    </div>
    <input class="k-input" id="gr-note" placeholder="メモ(任意)" style="width:100%; margin-top:6px;">
  </div>

  <div class="k-box">
    <b class="k-title" style="font-size:0.9rem;">公安メンバーの残高</b>
    <div id="kp-list" style="margin-top:8px;">読み込み中...</div>
  </div>
  <p style="color:#6b7799; font-size:11px;">KPは極秘タスクを✅終了すると、その報酬額ぶん増えるよ。</p>
</div>

<script>
async function loadKP() {
  const r = await fetch('/api/staff/kouan/points');
  const data = await r.json();
  if (data.ok === false || data.ok === undefined) { window.location.href = '/staff/board'; return; }
  document.getElementById('kp-rate').textContent = 'レート: ' + data.rate;
  const rateKp = 100;  // 100KPあたり
  if (data.is_zero) {
    document.getElementById('grant-box').style.display = 'block';
  }
  const myKp = Number(data.my_kp || 0);
  document.getElementById('my-kp').innerHTML =
    '<div style="color:#6b7799; font-size:12px;">あなたの残高' + (data.is_zero ? ' (🕶️ 一覧には出ない。本人にだけ見えるよ)' : '') + '</div>' +
    '<div style="font-size:2rem; font-weight:900; color:#c8e6a0;">' + myKp.toLocaleString() + ' KP</div>' +
    '<div style="color:#9aa7ff; font-size:13px;">= ' + (myKp / rateKp).toLocaleString() + ' 回年</div>';
  document.getElementById('kp-list').innerHTML = data.points.map((p, i) => `
    <div class="kp-row" style="${p.staff_id === data.my_id ? 'background:rgba(154,167,255,0.08); border-radius:8px; padding-left:8px; padding-right:8px;' : ''}">
      <span>${i === 0 && p.kp > 0 ? '👑 ' : ''}${escP(p.name)}</span>
      <span class="kp-num">${Number(p.kp).toLocaleString()} KP</span>
    </div>`).join('');
}
async function loadMembersKP() {
  // 名簿を読み込んで、配布と送金の相手選びに使う
  const r = await fetch('/api/staff/kouan/members');
  const data = await r.json();
  if (data.ok === false || data.ok === undefined) return;
  const opts = data.members.map(m => `<option value="${escP(m.staff_id)}">${escP(m.name)}</option>`).join('');
  document.getElementById('gr-member').innerHTML = opts;
  document.getElementById('tr-member').innerHTML = opts;
  document.getElementById('transfer-box').style.display = 'block';
}
loadMembersKP();

async function transferKP() {
  const to_staff_id = document.getElementById('tr-member').value;
  const amount = Number(document.getElementById('tr-amount').value || 0);
  if (amount <= 0) { window.toast('1KP以上を入力してね', 'error'); return; }
  if (confirm(amount + ' KPをあげるよ？(取り消しはできないよ)') === false) return;
  const r = await fetch('/api/staff/kouan/transfer', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({to_staff_id, amount})
  });
  const data = await r.json();
  window.toast(data.ok ? data.message : (data.error || 'エラー'), data.ok ? 'success' : 'error');
  document.getElementById('tr-amount').value = '';
  loadKP();
}

async function grantKP() {
  const staff_id = document.getElementById('gr-member').value;
  const amount = Number(document.getElementById('gr-amount').value || 0);
  const note = document.getElementById('gr-note').value.trim();
  if (amount === 0) { window.toast('KPの額を入力してね', 'error'); return; }
  const r = await fetch('/api/staff/kouan/grant', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({staff_id, amount, note})
  });
  const data = await r.json();
  window.toast(data.ok ? data.message : (data.error || 'エラー'), data.ok ? 'success' : 'error');
  document.getElementById('gr-amount').value = '';
  document.getElementById('gr-note').value = '';
  loadKP();
}

function escP(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
loadKP();
</script>
{% endblock %}
